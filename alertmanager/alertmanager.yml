global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'slack-notifications'
  
  # Route specific alerts differently
  routes:
    - match:
        severity: critical
      receiver: 'slack-critical'
      repeat_interval: 30m
    
    - match:
        severity: warning
      receiver: 'slack-notifications'
      repeat_interval: 1h

receivers:
  # Default notifications (Slack disabled - add slack_api_url to global and uncomment to enable)
  - name: 'slack-notifications'

  # Critical alerts (Slack disabled)
  - name: 'slack-critical'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'feature']
